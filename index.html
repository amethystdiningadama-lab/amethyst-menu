<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amethyst Dining - Premium Digital Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; background: #05020a; color: #fff; margin: 0; padding: 0; }
        .logo-area { text-align: center; margin: 20px 0; }
        .logo-img { max-width: 200px; height: auto; }
        .hero-section { text-align: center; padding: 40px 20px; }
        .tagline { font-size: 14px; letter-spacing: 4px; color: #d4af37; text-transform: uppercase; margin-bottom: 20px; }
        .hero-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-primary, .btn-secondary, .btn-callhero { padding: 12px 20px; border-radius: 5px; text-decoration: none; color: #fff; font-weight: bold; }
        .btn-primary { background: #d4af37; color: #000; }
        .btn-secondary { background: #5c1d8d; }
        .btn-callhero { background: #333; }
        .search-container { padding: 20px; }
        .search-box { background: #1a1a1a; padding: 10px; border-radius: 5px; display: flex; align-items: center; }
        input { background: none; border: none; color: #fff; width: 100%; padding-left: 10px; }
        .category-tabs { display: flex; overflow-x: auto; padding: 10px; gap: 10px; justify-content: center; }
        .tab-btn { background: #222; border: none; color: #fff; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .tab-btn.active { background: #d4af37; color: #000; }
        .menu-grid { padding: 20px; }
        
        /* የተስተካከለ የምግብ ካርድ እና አዝራሮች */
        .menu-item { border-bottom: 1px solid #333; padding: 20px 0; }
        .item-info h3 { margin: 0 0 5px 0; font-size: 1.2rem; }
        .item-price { color: #d4af37; font-weight: bold; margin: 10px 0; }
        
        .order-options { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .btn-opt { padding: 8px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; text-decoration: none; color: #fff; }
        .bg-form { background: #5c1d8d; }
        .bg-wa { background: #25D366; }
        .bg-tg { background: #0088cc; }

        .payment-box-section { background: #11091c; border: 1px dashed #d4af37; border-radius: 10px; margin: 30px 20px; padding: 20px; text-align: center; }
        .payment-accounts { text-align: left; background: #05020a; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="logo-area">
        <h1>AMETHYST</h1>
        <p>DINING</p>
    </div>

    <section class="hero-section">
        <h2>Luxury Dining Experience in Adama</h2>
        <div class="hero-buttons">
            <a href="#menuGrid" class="btn-secondary">View Menu</a>
            <a href="tel:+251969995662" class="btn-callhero"><i class="fas fa-phone"></i> Call Now</a>
        </div>
    </section>

    <main class="menu-grid" id="menuGrid">
        <!-- ምሳሌ (ይህንን መዋቅር ለእያንዳንዱ ምግብ ይተግብሩ) -->
        <div class="menu-item" data-category="soups">
            <h3>Butternut Squash Soup</h3>
            <p>Roasted squash blended with aromatic spices.</p>
            <div class="item-price">400 ETB</div>
            <div class="order-options">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLScn5gOT0ZfgeIgKvBxCWlnFHlSzto6YoehbYGtWpeYXRQrV8Q/viewform" target="_blank" class="btn-opt bg-form">Google Form</a>
                <a href="https://wa.me/251969995662?text=Butternut Squash Soup ማዘዝ እፈልጋለሁ" target="_blank" class="btn-opt bg-wa">WhatsApp</a>
                <a href="https://t.me/mr_makbel_aschalew?text=Butternut Squash Soup ማዘዝ እፈልጋለሁ" target="_blank" class="btn-opt bg-tg">Telegram</a>
            </div>
        </div>
    </main>

    <section class="payment-box-section">
        <h2>የክፍያ መመሪያ</h2>
        <div class="payment-accounts">
            <p>📱 Telebirr: 0968093003 (Henok Tafese)</p>
            <p>🏦 CBE: 1000648950911 (Henok Tafese)</p>
        </div>
    </section>

</body>
</html>
