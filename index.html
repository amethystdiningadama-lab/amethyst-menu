<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amethyst Dining - Digital Ordering System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; background: #05020a; color: #fff; margin: 0; padding: 0; }
        .logo-area { text-align: center; margin: 20px 0; }
        .logo-img { max-width: 200px; height: auto; }
        .hero-section { text-align: center; padding: 40px 20px; }
        .tagline { font-size: 14px; letter-spacing: 4px; color: #d4af37; text-transform: uppercase; margin-bottom: 20px; }
        .hero-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-primary, .btn-secondary, .btn-callhero { padding: 12px 20px; border-radius: 5px; text-decoration: none; color: #fff; font-weight: bold; }
        .btn-primary { background: #d4af37; color: #000; }
        .btn-secondary { background: #5c1d8d; }
        .btn-callhero { background: #333; }
        .search-container { padding: 20px; }
        .search-box { background: #1a1a1a; padding: 10px; border-radius: 5px; display: flex; align-items: center; }
        input { background: none; border: none; color: #fff; width: 100%; padding-left: 10px; }
        .category-tabs { display: flex; overflow-x: auto; padding: 10px; gap: 10px; justify-content: center; }
        .tab-btn { background: #222; border: none; color: #fff; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .tab-btn.active { background: #d4af37; color: #000; }
        .menu-grid { padding: 20px; }
        .menu-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 15px 0; }
        .item-price { color: #d4af37; font-weight: bold; }
        .info-section { text-align: center; padding: 40px 20px; border-top: 1px solid #333; }
        footer { text-align: center; padding: 40px 20px; background: #000; border-top: 2px solid #d4af37; }
        .action-buttons { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .btn-wa { background: #25D366; color: white; padding: 15px 20px; border-radius: 50%; font-size: 20px; text-decoration: none; }
        .btn-call { background: #d4af37; color: #000; padding: 15px 20px; border-radius: 50%; font-size: 20px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="logo-area">
        <h1 style="color: #d4af37; margin: 5px 0;">AMETHYST</h1>
        <p style="margin:0;">DINING</p>
    </div>

    <section class="hero-section">
        <h2>Order Your Meal Online</h2>
        <div class="tagline">TASTE THE EXCELLENCE</div>
        <div class="hero-buttons">
            <!-- እዚህ ቦታ ላይ YOUR_GOOGLE_FORM_LINK የሚለውን ሰርዘህ ያንተን ሊንክ አስገባ -->
            <a href="YOUR_GOOGLE_FORM_LINK" target="_blank" class="btn-primary">Order Now</a>
            <a href="#menuGrid" class="btn-secondary">View Menu</a>
            <a href="tel:+251969995662" class="btn-callhero"><i class="fas fa-phone"></i> Call Now</a>
        </div>
    </section>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="የሚፈልጉትን ምግብ እዚህ ይፈልጉ..." onkeyup="filterMenu()">
        </div>
    </div>
    <div class="category-tabs">
        <button class="tab-btn active" onclick="filterCategory('all')">ሁሉም</button>
        <button class="tab-btn" onclick="filterCategory('soups')">Soups</button>
        <button class="tab-btn" onclick="filterCategory('sushi')">Sushi</button>
        <button class="tab-btn" onclick="filterCategory('shareables')">Shareables</button>
        <button class="tab-btn" onclick="filterCategory('large-plates')">Large Plates</button>
        <button class="tab-btn" onclick="filterCategory('sides')">Sides & Dessert</button>
    </div>

    <main class="menu-grid" id="menuGrid">
        <!-- LARGE PLATES -->
        <div class="menu-item" data-category="large-plates"><div class="item-info"><h3>Chicken Teriyaki</h3></div><div class="item-price">1,700 ETB</div></div>
        <div class="menu-item" data-category="large-plates"><div class="item-info"><h3>Salmon Teriyaki</h3><p>Marinated with garlic and fine herbs.</p></div><div class="item-price">5,300 ETB</div></div>
    </main>

    <footer>
        <h3>AMETHYST DINING</h3>
        <p>📧 amethystdining.adama@gmail.com</p>
        <p>☎ +251 96 999 5662</p>
        <p>📍 Adama, Ethiopia</p>
    </footer>

    <div class="action-buttons">
        <a href="https://wa.me/251969995662" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i></a>
        <a href="tel:+251969995662" class="btn-call"><i class="fas fa-phone"></i></a>
    </div>

    <script>
        function filterCategory(category) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.menu-item').forEach(item => {
                item.style.display = (category === 'all' || item.getAttribute('data-category') === category) ? 'flex' : 'none';
            });
        }
        function filterMenu() {
            let k = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.menu-item').forEach(i => {
                i.style.display = (i.innerText.toLowerCase().includes(k)) ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
